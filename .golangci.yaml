version: "2"

run:
  timeout: 30m
  tests: true

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gocognit
    - goconst
    - gocritic
    - godox
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl_v5
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    gosec:
      excludes:
        - "G104"

    funlen:
      lines: 60
      statements: 40

    govet:
      enable:
        - shadow

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US
      ignore-rules:
        - gitlab

    unparam:
      check-exported: false

    nakedret:
      max-func-lines: 30

    gocritic:
      settings:
        captLocal:
          paramsOnly: true

    godox:
      keywords:
        - TODO
        - BUG
        - FIXME
        - NOTE
        - OPTIMIZE
        - HACK

    dogsled:
      max-blank-identifiers: 2

    depguard:
      rules:
        main:
          list-mode: lax
          allow:
            - $gostd
            - github.com/getkin/kin-openapi
            - github.com/gin-gonic/gin
            - github.com/sirupsen/logrus
            - github.com/stretchr/testify
            - github.com/phumberdroz/gin-openapi-validator

    whitespace:
      multi-if: false
      multi-func: false

    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: true
      case-max-lines: 0
      default: all
      disable:
        - assign-expr

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen
      - linters:
          - lll
        source: "^//go:generate "

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
