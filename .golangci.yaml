version: "2"

run:
  timeout: 30m
  tests: true

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gocognit
    - goconst
    - gocritic
    - godox
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    gosec:
      exclude:
        - "G104"

    funlen:
      lines: 60
      statements: 40

    govet:
      enable:
        - shadow

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US
      ignore-rules:
        - gitlab

    unused:
      check-exported: false

    unparam:
      check-exported: false

    nakedret:
      max-func-lines: 30

    gocritic:
      settings:
        captLocal:
          paramsOnly: true

    godox:
      keywords:
        - TODO
        - BUG
        - FIXME
        - NOTE
        - OPTIMIZE
        - HACK

    dogsled:
      max-blank-identifiers: 2

    whitespace:
      multi-if: false
      multi-func: false

    wsl:
      strict-append: true
      allow-assign-and-call: true
      allow-multiline-assign: true
      allow-cuddle-declarations: false
      allow-trailing-comment: false
      force-case-trailing-whitespace: 0

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen
      - linters:
          - lll
        source: "^//go:generate "

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
